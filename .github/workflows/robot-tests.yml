name: UI Automation Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t enterprise-tests .

    - name: Run Tests in Docker Container
      run: docker run --ipc=host -v ${{ github.workspace }}/results:/app/results enterprise-tests

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: results/
        retention-days: 7
