name: UI Automation Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Build Docker Image
      run: docker build -t ai-qa-framework .

    - name: Run Tests in Parallel with Pabot
      run: |
        mkdir -p results/allure-results
        # Inject Failure Categories
        cp .github/allure/categories.json results/allure-results/
        
        # Run tests
        docker run --ipc=host \
          -v ${{ github.workspace }}/results:/app/results \
          ai-qa-framework \
          pabot --processes 2 -d results --listener allure_robotframework:results/allure-results -v HEADLESS:True tests/

    - name: Generate Allure Metadata
      if: always()
      run: |
        # Generate Environment Properties
        cat <<EOF > results/allure-results/environment.properties
        Project=Autonomous Quality Engineering
        Framework=Robot Framework 7.0
        Driver=Playwright
        Agent=Antigravity Quality Specialist
        Environment=GitHub Actions CI
        OS=${{ runner.os }}
        Node_Version=$(node -v)
        EOF
        
        # Generate Executor Info
        cat <<EOF > results/allure-results/executor.json
        {
          "name": "GitHub Actions",
          "type": "github",
          "url": "${{ github.server_url }}/${{ github.repository }}",
          "buildOrder": ${{ github.run_number }},
          "buildName": "Run #${{ github.run_number }}",
          "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }
        EOF

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test-results
        path: results/
        retention-days: 7

    - name: Get Allure history
      uses: actions/checkout@v5
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      id: allure-report
      with:
        allure_results: results/allure-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report
